# Puerto del servicio
server.port=${PORT:8081}

# Nombre de la app
spring.application.name=customer-service

# DataSource
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}

spring.jpa.open-in-view=false

# Swagger configuration

swagger.server.url=${SWAGGER_SERVER_URL:http://localhost:8081}
swagger.server.description=${SWAGGER_SERVER_DESCRIPTION:Customer-service server}

swagger.contact.email=${SWAGGER_CONTACT_EMAIL:edmvp98@gmail.com}
swagger.contact.name=${SWAGGER_CONTACT_NAME:Bluedigi10}
swagger.contact.url=${SWAGGER_CONTACT_URL:https://github.com/Bluedigi10}

swagger.licence.name=${SWAGGER_LICENCE_NAME:MIT License}
swagger.licence.url=${SWAGGER_LICENCE_URL:https://opensource.org/license/mit}

swagger.info.title=${SWAGGER_INFO_TITLE:Customer Service API}
swagger.info.version=${SWAGGER_INFO_VERSION:1.0.0}
swagger.info.description=${SWAGGER_INFO_DESCRIPTION:API for customer management in java-test-liverpool.}
swagger.info.terms=${SWAGGER_INFO_TERMS:https://github.com/Bluedigi10/java-test-liverpool}
